<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3999793603988423"
     crossorigin="anonymous"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 60px 16px;
      background: #f0f0f0;
      color: #111;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 24px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 32px;
      font-size: 1.1rem;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #e6b800;
    }

    #themeToggle {
      background: #555;
      color: white;
      padding: 12px 20px;
    }

    #themeToggle:hover {
      background: #333;
    }

    body.dark #themeToggle {
      background: #ddd;
      color: #111;
    }

    body.dark #themeToggle:hover {
      background: #bbb;
    }

    #result {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .range1 { background: #fbc400; } /* 1~10 */
    .range2 { background: #69c8f2; } /* 11~20 */
    .range3 { background: #ff7272; } /* 21~30 */
    .range4 { background: #aaa; }    /* 31~40 */
    .range5 { background: #b0d840; } /* 41~45 */

    /* 제휴 문의 폼 */
    .form-section {
      margin-top: 60px;
      width: 100%;
      max-width: 480px;
    }

    .form-section h2 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 6px;
    }

    .form-section p.sub {
      text-align: center;
      color: #777;
      font-size: 0.9rem;
      margin: 0 0 20px;
    }

    body.dark .form-section p.sub { color: #aaa; }

    .form-section label {
      display: block;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .form-section input,
    .form-section textarea,
    .form-section select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 16px;
      background: white;
      color: #111;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    body.dark .form-section input,
    body.dark .form-section textarea,
    body.dark .form-section select {
      background: #2a2a40;
      border-color: #555;
      color: #eee;
    }

    .form-section input:focus,
    .form-section textarea:focus,
    .form-section select:focus {
      outline: none;
      border-color: #ffcc00;
    }

    .form-section textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-section button[type="submit"] {
      width: 100%;
      padding: 13px;
      font-size: 1.05rem;
    }

    #thanks {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    #thanks .icon { font-size: 3rem; }
    #thanks h2 { margin: 12px 0 8px; }
    #thanks p { color: #777; }
    body.dark #thanks p { color: #aaa; }

    /* 댓글 섹션 */
    .comments-section {
      margin-top: 60px;
      width: 100%;
      max-width: 800px;
      padding-bottom: 60px;
    }

    .comments-section h2 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <h1>로또 번호 생성기</h1>
  <div class="btn-row">
    <button onclick="generate()">번호 생성</button>
    <button id="themeToggle" onclick="toggleTheme()">🌙 다크모드</button>
  </div>
  <a href="animal-test.html" style="margin-top:16px; font-size:0.95rem; color:#888; text-decoration:none;">🐾 나는 강아지상? 고양이상? 테스트 →</a>
  <div id="result"></div>

  <!-- 제휴 문의 폼 -->
  <div class="form-section">
    <h2>제휴 문의</h2>
    <p class="sub">협업 및 제휴 관련 문의를 남겨주세요.<br>확인 후 빠르게 연락드리겠습니다.</p>

    <div id="formWrap">
      <form action="https://formspree.io/f/mwvwnkan" method="POST" onsubmit="handleSubmit(event)">
        <label for="name">이름 / 회사명</label>
        <input type="text" id="name" name="name" placeholder="홍길동 / 홍길동 주식회사" required>

        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>

        <label for="type">문의 유형</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>선택해주세요</option>
          <option value="광고/협찬">광고 / 협찬</option>
          <option value="콘텐츠 제휴">콘텐츠 제휴</option>
          <option value="기술 협업">기술 협업</option>
          <option value="기타">기타</option>
        </select>

        <label for="message">문의 내용</label>
        <textarea id="message" name="message" placeholder="제휴 제안 내용을 자유롭게 작성해주세요." required></textarea>

        <button type="submit">문의 보내기</button>
      </form>
    </div>

    <div id="thanks">
      <div class="icon">✅</div>
      <h2>문의가 접수되었습니다!</h2>
      <p>빠른 시일 내에 이메일로 연락드리겠습니다.</p>
    </div>
  </div>

  <!-- 댓글 섹션 -->
  <div class="comments-section">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
    <script>
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuild-10.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script>
    function generate() {
      const numbers = new Set();
      while (numbers.size < 6) {
        numbers.add(Math.floor(Math.random() * 45) + 1);
      }

      const sorted = [...numbers].sort((a, b) => a - b);

      const result = document.getElementById('result');
      result.innerHTML = sorted.map(n => {
        const range = Math.ceil(n / 10);
        const cls = range >= 5 ? 'range5' : `range${range}`;
        return `<div class="ball ${cls}">${n}</div>`;
      }).join('');
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('themeToggle').textContent = isDark ? '☀️ 화이트모드' : '🌙 다크모드';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
      } else {
        alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    }
  </script>
</body>
</html>
